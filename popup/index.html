<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 200px;
      margin: 0;
      padding: 8px;
      background: #171717;
      color: #ededed;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    .title {
      font-weight: 600;
      color: #3ecf8e;
      padding: 4px 8px 8px;
      font-size: 13px;
    }
    button {
      display: block;
      width: 100%;
      padding: 8px 10px;
      margin-bottom: 4px;
      border: none;
      border-radius: 6px;
      background: #242424;
      color: #ededed;
      font-size: 12px;
      cursor: pointer;
      text-align: left;
    }
    button:hover {
      background: #2a2a2a;
    }
    button:last-child {
      margin-bottom: 0;
    }
    .icon {
      margin-right: 6px;
    }
  </style>
</head>
<body>
  <div class="title">Supabase Inspector</div>
  <button id="side-panel"><span class="icon">◧</span>Open Side Panel</button>
  <button id="window"><span class="icon">⧉</span>Open in Window</button>
  <script src="popup.js"></script>
</body>
</html>
